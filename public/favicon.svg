<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#1a237e"/>

  <!-- Orange runner silhouette (simplified kabaddi player lunging forward) -->
  <!-- Body torso -->
  <ellipse cx="28" cy="26" rx="7" ry="9" fill="#E85D04" transform="rotate(-20 28 26)"/>
  <!-- Head -->
  <circle cx="36" cy="14" r="5" fill="#E85D04"/>
  <!-- Front arm reaching forward -->
  <line x1="34" y1="22" x2="50" y2="18" stroke="#E85D04" stroke-width="4" stroke-linecap="round"/>
  <!-- Back arm -->
  <line x1="22" y1="28" x2="12" y2="24" stroke="#E85D04" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Front leg lunging forward -->
  <line x1="26" y1="34" x2="38" y2="50" stroke="#E85D04" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Back leg -->
  <line x1="24" y1="34" x2="12" y2="46" stroke="#E85D04" stroke-width="4" stroke-linecap="round"/>
  <!-- Front foot -->
  <ellipse cx="39" cy="52" rx="5" ry="2.5" fill="#E85D04" transform="rotate(-10 39 52)"/>
  <!-- Back foot -->
  <ellipse cx="10" cy="47" rx="4" ry="2" fill="#E85D04" transform="rotate(10 10 47)"/>

  <!-- Heartbeat / ECG line in white -->
  <polyline
    points="4,44 12,44 15,36 18,52 22,38 26,48 30,44 60,44"
    fill="none"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />
</svg>